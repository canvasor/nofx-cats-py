version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cats
      POSTGRES_USER: cats
      POSTGRES_PASSWORD: cats
    ports:
      - "5432:5432"
    volumes:
      - cats_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - cats_clickhouse:/var/lib/clickhouse

volumes:
  cats_postgres:
  cats_clickhouse:
